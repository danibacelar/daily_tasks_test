   questions:[

    {q:"School starts at 7:15.",options:["School starts at quarter past seven.","School starts at seven quarter.","School starts at quarter to seven.","School starts at seven past quarter."],answer:"School starts at quarter past seven."},
    {q:"I go to bed at 8:45.",options:["I go to bed at quarter past nine.","I go to bed at quarter to nine.","I go to bed at half past eight.","I go to bed at eight quarter."],answer:"I go to bed at quarter to nine."}

  {id:7,title:"Mission 7 – Adverbs of Frequency",icon:"📊",points:10,type:"multiple_choice",

   instructions:"Find the CORRECT version of each sentence!",
   questions:[
    {q:"❌ She cook dinner every day.",options:["She cooking dinner every day.","She cooks dinner every day.","She is cook dinner every day.","She do cooks dinner every day."],answer:"She cooks dinner every day."},
    {q:"❌ I am usually take the dog for a walk.",options:["I usually takes the dog for a walk.","I am usually walking the dog for a walk.","I usually take the dog for a walk.","I usually taking the dog for a walk."],answer:"I usually take the dog for a walk."},
    {q:"❌ Does he likes to clean up?",options:["Does he like to clean up?","Do he likes to clean up?","Does he liking to clean up?","Does he to like clean up?"],answer:"Does he like to clean up?"}
  ]},
  {id:9,title:"Mission 9 – Grammar Choice",icon:"🏆",points:10,type:"multiple_choice",
   instructions:"Choose the correct word to complete each sentence!",
   questions:[
    {q:"Is there _____ milk in the fridge?",options:["some","any","a","the"],answer:"any"},
    {q:"I have _____ homework to do tonight.",options:["any","an","some","are"],answer:"some"},
    {q:"The vet _____ care of animals every day.",options:["take","takes","taking","to take"],answer:"takes"}
  ]},
  scrambleMission
];

const MC = missionColors = [
  {bg:"#fff0f6",accent:"#e91e8c",light:"#ffd6eb"},
  {bg:"#f0f4ff",accent:"#4361ee",light:"#c8d3ff"},
  {bg:"#f0fff4",accent:"#16a34a",light:"#bbf7d0"},
  {bg:"#fffbeb",accent:"#d97706",light:"#fde68a"},
  {bg:"#fff8f0",accent:"#ea580c",light:"#fed7aa"},
  {bg:"#f0fdff",accent:"#0891b2",light:"#a5f3fc"},
  {bg:"#f7fff0",accent:"#65a30d",light:"#d9f99d"},
  {bg:"#fff0f0",accent:"#dc2626",light:"#fecaca"},
  {bg:"#f0f0ff",accent:"#6d28d9",light:"#c4b5fd"},
  {bg:"#f5fff0",accent:"#16803c",light:"#bbf7d0"},
];

const medals = [
  {min:90,label:"🏆 Genius Explorer!",sub:"Outstanding work!",color:"#d97706"},
  {min:70,label:"🥈 Super Adventurer!",sub:"Really well done!",color:"#64748b"},
  {min:50,label:"🥉 Brave Beginner!",sub:"Good effort!",color:"#b45309"},
  {min:0, label:"🌟 Keep Practicing!",sub:"You can do it!",color:"#7c3aed"}
];

const ENC = ["Amazing! 🌟","Correct! 🎉","Great job! 💪","Brilliant! ✨","Spot on! 🎯"];
const rand = () => ENC[Math.floor(Math.random()*ENC.length)];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── styles helpers ──
const btnBase = (bg,border,color,extra={}) => ({background:bg,border,color,borderRadius:10,padding:"10px 14px",textAlign:"left",fontSize:14,width:"100%",marginBottom:7,fontWeight:500,transition:"all 0.15s",...extra});

function ScrambleMission({mission, mc, onSubmit}){
  const total = mission.questions.length;
  const [qIdx,setQIdx] = useState(0);
  const [pools,setPools] = useState(()=>mission.questions.map(q=>shuffle(q.words)));
  const [selected,setSelected] = useState(()=>mission.questions.map(()=>[]));
  const [result,setResult] = useState(null);
  const [done,setDone] = useState(false);

  const q=mission.questions[qIdx], pool=pools[qIdx], sel=selected[qIdx];

  const pickWord=(word,idx)=>{
    if(result!==null)return;
    const np=[...pool]; np.splice(idx,1);
    setPools(pools.map((p,i)=>i===qIdx?np:p));
    setSelected(selected.map((s,i)=>i===qIdx?[...sel,word]:s));
  };
  const removeWord=(word,idx)=>{
    if(result!==null)return;
    const ns=[...sel]; ns.splice(idx,1);
    setPools(pools.map((p,i)=>i===qIdx?[...pool,word]:p));
    setSelected(selected.map((s,i)=>i===qIdx?ns:s));
  };
  const check=()=>setResult(sel.join(" ")===q.answer);
  const next=()=>{
    if(qIdx+1>=total){
      let sc=0;
      mission.questions.forEach((q,i)=>{if(selected[i].join(" ")===q.answer)sc+=Math.floor(mission.points/total);});
      setDone(true); onSubmit(sc);
    } else { setResult(null); setQIdx(i=>i+1); }
  };

  if(done) return null;

  const answerBorder = result===true?"2px solid #16a34a":result===false?"2px solid #dc2626":`2px dashed ${mc.accent}`;

  return e("div",null,
    e("div",{style:{fontSize:12,color:mc.accent,fontWeight:700,marginBottom:12}},`Question ${qIdx+1} of ${total}`),
    e("div",{style:{minHeight:54,background:"#fff",border:answerBorder,borderRadius:12,padding:"10px 12px",marginBottom:14,display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}},
      sel.length===0 && e("span",{style:{color:"#bbb",fontSize:13}},"Tap words below to build your sentence..."),
      sel.map((w,i)=>e("button",{key:i,onClick:()=>removeWord(w,i),style:{
        background:result===true?"#dcfce7":result===false?"#fee2e2":mc.light,
        border:`1.5px solid ${result===true?"#16a34a":result===false?"#dc2626":mc.accent}`,
        color:result===true?"#14532d":result===false?"#7f1d1d":mc.accent,
        borderRadius:8,padding:"6px 12px",fontSize:14,fontWeight:600,cursor:result!==null?"default":"pointer"
      }},w))
    ),
    e("div",{style:{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}},
      pool.map((w,i)=>e("button",{key:i,onClick:()=>pickWord(w,i),style:{
        background:"#fff",border:`1.5px solid ${mc.light}`,color:"#444",
        borderRadius:8,padding:"6px 12px",fontSize:14,fontWeight:500,
        cursor:result!==null?"default":"pointer",opacity:result!==null?0.5:1
      }},w))
    ),
    result!==null && e("div",{style:{background:result?"#dcfce7":"#fee2e2",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,fontWeight:600,color:result?"#14532d":"#7f1d1d"}},
      result?`${rand()} ✅`:`❌ Correct: ${q.answer}`
    ),
    result===null
      ? e("button",{onClick:check,disabled:sel.length===0,style:{width:"100%",padding:13,background:sel.length===0?"#ddd":`linear-gradient(135deg,${mc.accent},#7c3aed)`,color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700}},"✅ Check Answer!")
      : e("button",{onClick:next,style:{width:"100%",padding:13,background:`linear-gradient(135deg,${mc.accent},#7c3aed)`,color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700}},
          qIdx+1>=total?"🏁 Finish Mission!":"➡️ Next Question!")
  );
}

function App(){
  const [screen,setScreen]=useState("home");
  const [mIdx,setMIdx]=useState(0);
  const [total,setTotal]=useState(0);
  const [scores,setScores]=useState({});
  const [answers,setAnswers]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const [feedback,setFeedback]=useState({});
  const [writing,setWriting]=useState({});
  const topRef=useRef();

  const mission=missions[mIdx], mc=MC[mIdx];
  const TOTAL_PTS=missions.reduce((s,m)=>s+m.points,0);
  const scrollTop=()=>topRef.current&&topRef.current.scrollIntoView({behavior:"smooth"});

  const submit=()=>{
    if(submitted)return;
    setSubmitted(true);
    let earned=0; const fb={};
    if(mission.type==="multiple_choice"||mission.type==="true_false"){
      mission.questions.forEach((q,i)=>{const ok=answers[i]===q.answer;fb[i]=ok;if(ok)earned+=Math.floor(mission.points/mission.questions.length);});
    } else if(mission.type==="writing"){
      mission.questions.forEach((q,i)=>{const ok=writing[i]&&writing[i].trim().length>5;fb[i]=ok?"ok":"empty";if(ok)earned+=Math.floor(mission.points/mission.questions.length);});
    }
    setFeedback(fb); setScores(s=>({...s,[mIdx]:earned})); setTotal(t=>t+earned);
  };

  const handleScramble=(score)=>{setScores(s=>({...s,[mIdx]:score}));setTotal(t=>t+score);setSubmitted(true);};

  const nextMission=()=>{
    setAnswers({});setFeedback({});setWriting({});setSubmitted(false);
    if(mIdx+1>=missions.length)setScreen("results");
    else setMIdx(i=>i+1);
    scrollTop();
  };

  const restart=()=>{setScreen("home");setMIdx(0);setTotal(0);setScores({});setAnswers({});setFeedback({});setWriting({});setSubmitted(false);};

  const optBtn=(opt,qi,q)=>{
    const sel=answers[qi]===opt, ok=submitted&&opt===q.answer, bad=submitted&&sel&&!ok;
    let bg="#fff",border=`1.5px solid ${mc.light}`,color="#333";
    if(sel&&!submitted){bg=mc.light;border=`2px solid ${mc.accent}`;color=mc.accent;}
    if(ok){bg="#dcfce7";border="2px solid #16a34a";color="#14532d";}
    if(bad){bg="#fee2e2";border="2px solid #dc2626";color="#7f1d1d";}
    return e("button",{key:opt,onClick:()=>{if(!submitted)setAnswers(a=>({...a,[qi]:opt}));},style:btnBase(bg,border,color)},
      submitted&&ok?"✅ "+opt : submitted&&bad?"❌ "+opt : opt);
  };

  const tfBtn=(val,qi,q)=>{
    const sel=answers[qi]===val, ok=submitted&&val===q.answer, bad=submitted&&sel&&!ok;
    let bg="#fff",border=`1.5px solid ${mc.light}`,color="#333";
    if(sel&&!submitted){bg=mc.light;border=`2px solid ${mc.accent}`;color=mc.accent;}
    if(ok){bg="#dcfce7";border="2px solid #16a34a";color="#14532d";}
    if(bad){bg="#fee2e2";border="2px solid #dc2626";color="#7f1d1d";}
    return e("button",{key:String(val),onClick:()=>{if(!submitted)setAnswers(a=>({...a,[qi]:val}));},
      style:{...btnBase(bg,border,color),width:"auto",padding:"10px 24px",textAlign:"center"}},
      val?"✅ TRUE":"❌ FALSE");
  };

  // ── HOME ──
  if(screen==="home") return e("div",{style:{background:"linear-gradient(135deg,#f0f4ff 0%,#fff0f6 50%,#f5f0ff 100%)",minHeight:"100vh",padding:"2rem 1rem"}},
    e("div",{style:{maxWidth:600,margin:"0 auto"}},
      e("div",{style:{textAlign:"center",marginBottom:"1.5rem"}},
        e("div",{style:{fontSize:64,marginBottom:8}},"🌍"),
        e("h1",{style:{fontSize:28,fontWeight:700,color:"#4361ee",margin:"0 0 6px"}},"Daily Life Adventure"),
        e("p",{style:{color:"#7c3aed",fontSize:15,margin:"0 0 2px",fontWeight:500}},"A super fun English game!"),
        e("p",{style:{color:"#888",fontSize:13,margin:0}},`Level A1–A2 · 10 Missions · ${TOTAL_PTS} Points`)
      ),
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:"1.5rem"}},
        missions.map((m,i)=>e("div",{key:i,style:{background:MC[i].bg,borderRadius:12,padding:"10px 6px",border:`2px solid ${MC[i].light}`,textAlign:"center"}},
          e("div",{style:{fontSize:22}},m.icon),
          e("div",{style:{fontSize:11,fontWeight:600,color:MC[i].accent,marginTop:4}},`M${m.id}`),
          e("div",{style:{fontSize:10,color:"#888"}},`${m.points}pts`)
        ))
      ),
      e("div",{style:{background:"#fff",borderRadius:16,padding:"1.2rem",marginBottom:"1.2rem",border:"2px solid #e0d7ff"}},
        e("div",{style:{fontSize:14,fontWeight:600,color:"#7c3aed",marginBottom:8}},"🎮 How to play:"),
        e("div",{style:{fontSize:13,color:"#555",lineHeight:1.8}},
          "✅ Complete each mission to earn points",e("br"),
          "🌟 Get immediate feedback after each answer",e("br"),
          "🏆 Earn a medal at the end based on your score!")
      ),
      e("button",{onClick:()=>setScreen("game"),style:{width:"100%",padding:"16px",background:"linear-gradient(135deg,#7c3aed,#4361ee)",color:"#fff",border:"none",borderRadius:14,fontSize:17,fontWeight:700,boxShadow:"0 4px 14px rgba(124,58,237,0.35)"}},"🚀 Start Adventure!")
    )
  );

  // ── RESULTS ──
  if(screen==="results"){
    const pct=Math.round((total/TOTAL_PTS)*100);
    const medal=medals.find(m=>pct>=m.min);
    return e("div",{style:{background:"linear-gradient(135deg,#f0f4ff 0%,#fff0f6 50%,#f5f0ff 100%)",minHeight:"100vh",padding:"2rem 1rem"}},
      e("div",{style:{maxWidth:560,margin:"0 auto",textAlign:"center"}},
        e("div",{style:{fontSize:72,marginBottom:8}},medal.label.split(" ")[0]),
        e("h2",{style:{fontSize:24,fontWeight:700,color:medal.color,margin:"0 0 4px"}},medal.label.slice(2)),
        e("p",{style:{color:"#888",marginBottom:20,fontSize:15}},`${medal.sub} You finished all 10 missions!`),
        e("div",{style:{background:"#fff",borderRadius:16,padding:"1.5rem",marginBottom:20,border:"2px solid #e0d7ff"}},
          e("div",{style:{fontSize:52,fontWeight:700,color:"#7c3aed"}},total,e("span",{style:{fontSize:22,color:"#bbb"}},`/${TOTAL_PTS}`)),
          e("div",{style:{color:"#888",fontSize:14,marginBottom:12}},`Total Score · ${pct}%`),
          e("div",{style:{background:"#f0f0ff",borderRadius:99,height:14,overflow:"hidden"}},
            e("div",{style:{width:`${pct}%`,background:"linear-gradient(90deg,#7c3aed,#4361ee)",borderRadius:99,height:14}})
          )
        ),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:20}},
          missions.map((m,i)=>{
            const sc=scores[i]||0, c=MC[i];
            return e("div",{key:i,style:{background:c.bg,borderRadius:10,padding:"10px 14px",border:`2px solid ${c.light}`,display:"flex",justifyContent:"space-between",alignItems:"center"}},
              e("span",{style:{fontSize:13,color:"#555"}},`${m.icon} Mission ${m.id}`),
              e("span",{style:{fontSize:13,fontWeight:700,color:sc>=7?"#16a34a":"#dc2626"}},`${sc}/${m.points}`)
            );
          })
        ),
        e("button",{onClick:restart,style:{padding:"14px 40px",background:"linear-gradient(135deg,#7c3aed,#4361ee)",color:"#fff",border:"none",borderRadius:14,fontSize:15,fontWeight:700}},"🔄 Play Again!")
      )
    );
  }

  // ── GAME ──
  const progress=Math.round((mIdx/missions.length)*100);
  const isLast=mIdx===missions.length-1;

  const nextBtn = e("button",{onClick:nextMission,style:{width:"100%",padding:15,background:`linear-gradient(135deg,${mc.accent},#7c3aed)`,color:"#fff",border:"none",borderRadius:14,fontSize:16,fontWeight:700,boxShadow:`0 4px 14px ${mc.accent}55`}},
    isLast?"🏆 See My Results!":"➡️ Next Mission!");

  const levelUpBox = e("div",null,
    e("div",{style:{textAlign:"center",marginBottom:10,padding:"12px",background:mc.light,borderRadius:12,color:mc.accent,fontWeight:700,fontSize:15,border:`2px dashed ${mc.accent}`}},
      isLast?"🏁 Last mission complete! Amazing!":"⬆️ Level Up! Ready for the next mission?"),
    nextBtn
  );

  return e("div",{style:{background:mc.bg,minHeight:"100vh",padding:"1rem",transition:"background 0.4s"},ref:topRef},
    e("div",{style:{maxWidth:620,margin:"0 auto"}},
      // header
      e("div",{style:{background:"#fff",borderRadius:14,padding:"10px 16px",marginBottom:14,border:`2px solid ${mc.light}`,display:"flex",alignItems:"center",justifyContent:"space-between"}},
        e("div",{style:{fontSize:13,fontWeight:600,color:mc.accent}},`Mission ${mIdx+1} of ${missions.length}`),
        e("div",{style:{flex:1,margin:"0 14px"}},
          e("div",{style:{background:"#f0f0ff",borderRadius:99,height:10,overflow:"hidden"}},
            e("div",{style:{width:`${progress}%`,background:`linear-gradient(90deg,${mc.accent},${mc.light})`,borderRadius:99,height:10,transition:"width 0.4s"}})
          )
        ),
        e("div",{style:{fontSize:13,fontWeight:700,color:mc.accent}},`⭐ ${total} pts`)
      ),
      // card
      e("div",{style:{background:"#fff",border:`2px solid ${mc.light}`,borderRadius:16,padding:"1.25rem",marginBottom:14}},
        e("div",{style:{background:mc.bg,borderRadius:12,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12,border:`1.5px dashed ${mc.light}`}},
          e("span",{style:{fontSize:36}},mission.icon),
          e("div",null,
            e("div",{style:{fontSize:11,fontWeight:700,color:mc.accent,textTransform:"uppercase",letterSpacing:0.8}},`+${mission.points} points`),
            e("div",{style:{fontSize:15,fontWeight:700,color:"#333"}},mission.title)
          )
        ),
        e("div",{style:{background:mc.light,borderRadius:10,padding:"10px 14px",marginBottom:18,fontSize:13,color:mc.accent,fontWeight:600}},`📋 ${mission.instructions}`),
        mission.text && e("div",{style:{background:"#fffbeb",borderRadius:10,padding:"14px 16px",fontSize:13,color:"#555",marginBottom:18,lineHeight:1.9,whiteSpace:"pre-line",border:"1.5px solid #fde68a"}},mission.text),

        // SCRAMBLE
        mission.type==="scramble" && !submitted && e(ScrambleMission,{mission,mc,onSubmit:handleScramble}),

        // MULTIPLE CHOICE
        mission.type==="multiple_choice" && mission.questions.map((q,qi)=>
          e("div",{key:qi,style:{marginBottom:22,background:mc.bg,borderRadius:12,padding:"14px"}},
            e("div",{style:{fontSize:14,fontWeight:600,color:"#333",marginBottom:10}},`${qi+1}. ${q.q}`),
            q.options.map(opt=>optBtn(opt,qi,q)),
            submitted && e("div",{style:{fontSize:12,color:feedback[qi]?"#16a34a":"#dc2626",fontWeight:600,marginTop:2}},
              feedback[qi]?rand():`Correct answer: ${q.answer}`)
          )
        ),

        // TRUE/FALSE
        mission.type==="true_false" && mission.questions.map((q,qi)=>
          e("div",{key:qi,style:{marginBottom:16,background:mc.bg,borderRadius:12,padding:"12px 14px"}},
            e("div",{style:{fontSize:13,color:"#444",marginBottom:8,fontWeight:500}},`${qi+1}. ${q.q}`),
            e("div",{style:{display:"flex",gap:10}},[true,false].map(v=>tfBtn(v,qi,q))),
            submitted && e("div",{style:{fontSize:12,color:feedback[qi]?"#16a34a":"#dc2626",fontWeight:600,marginTop:6}},
              feedback[qi]?rand():`Correct: ${q.answer?"TRUE":"FALSE"}`)
          )
        ),

        // WRITING
        mission.type==="writing" && mission.questions.map((q,qi)=>
          e("div",{key:qi,style:{marginBottom:20,background:mc.bg,borderRadius:12,padding:"14px"}},
            e("div",{style:{fontSize:14,fontWeight:600,color:"#333",marginBottom:8}},`${qi+1}. ${q.q}`),
            e("textarea",{placeholder:q.placeholder,value:writing[qi]||"",onChange:ev=>setWriting(a=>({...a,[qi]:ev.target.value})),disabled:submitted,
              style:{width:"100%",minHeight:72,padding:10,fontSize:13,borderRadius:10,border:`1.5px solid ${mc.light}`,background:"#fff",color:"#333",resize:"vertical"}}),
            submitted && e("div",{style:{fontSize:12,color:feedback[qi]==="ok"?"#16a34a":"#dc2626",fontWeight:600,marginTop:4}},
              feedback[qi]==="ok"?"✅ Great writing! Keep it up!":"❌ Please write a full sentence!")
          )
        )
      ),

      // BUTTONS
      mission.type!=="scramble" && (
        submitted ? levelUpBox :
        e("button",{onClick:submit,style:{width:"100%",padding:15,background:`linear-gradient(135deg,${mc.accent},#7c3aed)`,color:"#fff",border:"none",borderRadius:14,fontSize:16,fontWeight:700,boxShadow:`0 4px 14px ${mc.accent}55`}},"✅ Submit Mission!")
      ),
      mission.type==="scramble" && submitted && levelUpBox
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(e(App));
</script>
</body>
</html>
